<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>FilmyKhazana — Movies & TV</title>
    <meta name="description" content="FilmyKhazana — discover and watch movies and TV with a clean, modern interface." />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="./favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <meta property="og:title" content="FilmyKhazana — Movies & TV" />
    <meta property="og:description" content="Discover and watch movies and TV with a clean, modern interface." />
    <meta property="og:image" content="./logo.png" />
    <meta property="og:type" content="website" />
    <script>
      // Apply theme before paint to avoid flash.
      (function () {
        try {
          var saved = localStorage.getItem('filmykhazana.theme');
          var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = saved === 'light' || saved === 'dark' ? saved : (prefersLight ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <script>
      // spa-github-pages decoder: restore the URL that 404.html encoded into ?/path
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (part) { return part.replace(/~and~/g, '&'); })
            .join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script>
      (function () {
        var blockKeys = function (e) {
          var key = e.key || '';
          if (key === 'F12' || key === 'F11') { e.preventDefault(); e.stopPropagation(); return; }
          var combo = key.toUpperCase();
          if ((e.ctrlKey || e.metaKey) && e.shiftKey && /^(I|J|C|K)$/.test(combo)) { e.preventDefault(); e.stopPropagation(); return; }
          if ((e.ctrlKey || e.metaKey) && !e.shiftKey && /^(U|S)$/.test(combo)) { e.preventDefault(); e.stopPropagation(); return; }
        };
        window.addEventListener('keydown', blockKeys, true);
        document.addEventListener('contextmenu', function (e) { e.preventDefault(); }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
